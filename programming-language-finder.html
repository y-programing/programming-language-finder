            padding: 0;
            box-sizing: border-box;
        }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            font-weight: 500;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #f8f9fa;
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #764ba2;
        }

        .option-icon {
            font-size: 28px;
            min-width: 40px;
        }

        .option-content {
            flex: 1;
        }

        .option-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .option-desc {
            font-size: 13px;
            opacity: 0.8;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 100%;
            font-weight: 600;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-container {
            animation: fadeIn 0.6s ease;
        }

        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .result-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .result-subtitle {
            color: #666;
            font-size: 16px;
        }

            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .language-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .language-rank {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;

            margin-bottom: 20px;

            align-items: center;
            gap: 15px;

        .language-icon {

        .language-name {

            font-weight: 600;

        .language-subtitle {

            font-size: 14px;

            color: white;

            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
        }

        .language-description {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 15px;
        }

        .language-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: white;
            border-radius: 10px;

        .stat-icon {
            font-size: 20px;

        .stat-content {

        .stat-label {

            color: #999;

        .stat-value {

            color: #333;

            padding: 15px;
            border-radius: 10px;

            background: #d4edda;
        }

        .cons {
            background: #f8d7da;
        }

        .pros h4, .cons h4 {
            margin-bottom: 10px;

        .pros h4 {
            color: #155724;
        }

        .cons h4 {
            color: #721c24;
        }

            padding-left: 0;
        }

        .pros li, .cons li {
            margin-bottom: 6px;
            font-size: 13px;
            padding-left: 20px;
            position: relative;
        }

        .pros li {
            color: #155724;
        }

        .cons li {
            color: #721c24;
        }

        .pros li:before {
            content: "✓";
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .cons li:before {
            content: "×";
            position: absolute;
            left: 0;
            font-weight: bold;
        }

            gap: 12px;
            align-items: flex-start;

            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;

            font-size: 14px;
            margin-bottom: 4px;

            border-radius: 10px;

            margin-bottom: 12px;

            font-size: 14px;
            color: #333;

            color: #666;

            display: none;
        }

            from {

                transform: translateY(20px);
            }
            to {

            }

                grid-template-columns: 1fr;
            }

            }
        }

</head>

        let currentQuestion = 0;
        let scores = {};
        let selectedOption = null;

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.remove('hidden');
            currentQuestion = 0;
            scores = {};
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = 
                `質問 ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question').textContent = question.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <span class="option-icon">${option.icon}</span>
                    <div class="option-content">
                        <div class="option-title">${option.title}</div>
                        <div class="option-desc">${option.desc}</div>
                    </div>
                `;
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            selectedOption = null;
            document.getElementById('next-button').disabled = true;
        }

        function selectOption(index) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[index].classList.add('selected');
            selectedOption = index;
            document.getElementById('next-button').disabled = false;
        }

        function nextQuestion() {
            if (selectedOption === null) return;

            const question = questions[currentQuestion];
            const selected = question.options[selectedOption];
            
            for (let key in selected.scores) {
                scores[key] = (scores[key] || 0) + selected.scores[key];
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function calculateMatch(language) {
            let matchScore = 0;
            let totalWeight = 0;

            for (let key in language.requirements) {
                const userScore = scores[key] || 0;
                const requirement = language.requirements[key];
                const weight = requirement;

                if (userScore >= requirement) {
                    matchScore += userScore * weight;
                } else {
                    matchScore += userScore * weight * 0.5;
                }
                totalWeight += 3 * weight;
            }

            return Math.round((matchScore / totalWeight) * 100);
        }

        function showResult() {
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const recommendations = languages.map(lang => ({
                language: lang,
                matchPercentage: calculateMatch(lang)
            }));

            recommendations.sort((a, b) => b.matchPercentage - a.matchPercentage);

            const topRecommendations = recommendations.slice(0, 3);
            const recommendationsContainer = document.getElementById('recommendations');
            recommendationsContainer.innerHTML = '';

            topRecommendations.forEach((rec, index) => {
                const medals = ['🥇', '🥈', '🥉'];
                const langCard = document.createElement('div');
                langCard.className = 'language-card';
                langCard.innerHTML = `
                    <div class="language-rank">${medals[index]}</div>
                    <div class="language-header">
                        <div class="language-icon">${rec.language.icon}</div>
                        <div class="language-info">
                            <h2 class="language-name">${rec.language.name}</h2>
                            <div class="language-subtitle">${rec.language.subtitle}</div>
                            <span class="match-rate">適合度 ${rec.matchPercentage}%</span>
                        </div>
                    </div>
                    <p class="language-description">${rec.language.description}</p>
                    
                    <div class="language-stats">
                        <div class="stat-item">
                            <span class="stat-icon">📊</span>
                            <div class="stat-content">
                                <div class="stat-label">難易度</div>
                                <div class="stat-value">${rec.language.difficulty}</div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">⏱️</span>
                            <div class="stat-content">
                                <div class="stat-label">習得期間</div>
                                <div class="stat-value">${rec.language.learningTime}</div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">💼</span>
                            <div class="stat-content">
                                <div class="stat-label">求人需要</div>
                                <div class="stat-value">${rec.language.jobDemand}</div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">💰</span>
                            <div class="stat-content">
                                <div class="stat-label">平均年収</div>
                                <div class="stat-value">${rec.language.averageSalary}</div>
                            </div>
                        </div>
                    </div>

                    <div class="use-cases">
                        <h4>💡 できること</h4>
                        <div class="use-case-tags">
                            ${rec.language.useCases.map(useCase => 
                                `<span class="use-case-tag">${useCase}</span>`
                            ).join('')}
                        </div>
                    </div>

                    <div class="pros-cons">
                        <div class="pros">
                            <h4>👍 メリット</h4>
                            <ul>
                                ${rec.language.pros.map(pro => `<li>${pro}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="cons">
                            <h4>👎 注意点</h4>
                            <ul>
                                ${rec.language.cons.map(con => `<li>${con}</li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <div class="learning-path">
                        <h4>📚 学習ロードマップ</h4>
                        <div class="learning-steps">
                            ${rec.language.learningPath.map((step, i) => `
                                <div class="learning-step">
                                    <div class="step-number">${i + 1}</div>
                                    <div class="step-content">
                                        <div class="step-title">${step.title}</div>
                                        <div class="step-description">${step.desc}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="resources">
                        <h4>🎓 おすすめ学習リソース</h4>
                        <div class="resource-list">
                            ${rec.language.resources.map(resource => `
                                <div class="resource-item">
                                    <span class="resource-icon">${resource.icon}</span>
                                    <div class="resource-content">
                                        <div class="resource-name">${resource.name}</div>
                                        <div class="resource-type">${resource.type}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                recommendationsContainer.appendChild(langCard);
            });

            const result = {
                date: new Date().toISOString(),
                scores: scores,
                recommendations: topRecommendations.map(r => ({
                    name: r.language.name,
                    match: r.matchPercentage
                }))
            };
            localStorage.setItem('lastLanguageResult', JSON.stringify(result));
        }

        function restartTest() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
